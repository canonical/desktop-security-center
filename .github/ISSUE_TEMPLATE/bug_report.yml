name: Bug report for the Security Center
description: Create a report to help us improve
labels:
  - bug
body:
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: |
      Please search to see if an issue already exists for this bug: https://github.com/canonical/desktop-security-center/issues.
    options:
    - label: I have searched the existing issues
      required: true
- type: textarea
  attributes:
    label: Describe the bug
    description: |
      A clear and concise description of what the bug is. You can also attach screenshots or recordings.
  validations:
    required: false
- type: textarea
  attributes:
    label: Steps to reproduce the behavior
    placeholder: |
      1. Go to '...'
      2. Click on '....'
      3. Scroll down to '....'
      4. See error
  validations:
    required: false
- type: textarea
  id: expected_behavior
  attributes:
    label: Expected behavior
    description: |
      A clear and concise description of what you expected to happen.
  validations:
    required: false
- type: input
  attributes:
    label: Ubuntu release
    description: What version of Ubuntu are you running? E.g. '26.04 LTS'. You can find it in Settings > About, or by running `lsb_release -d` in the terminal.
  validations:
    required: false
- type: textarea
  attributes:
    label: System info
    description: |
      Please run this command in your terminal:
      ```uname -rvm && snap info snapd prompting-client desktop-security-center```
      and paste the output here. It will give us information about your system such as the kernel version and the versions of the relevant packages.
  validations:
    required: false
- type: textarea
  attributes:
    label: Additional context
    description: |
      You can attach screenshots, recordings, logs, or any other information that you think might be helpful. Please remember to anonymize any personal data.
  validations:
    required: false